<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sorting Hat</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
            background: #111;
            color: white;
        }

        h1 { font-size: 40px; }
        h2 { font-size: 28px; }

        /* 🔊 Audio Button */
        #audioBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: #28a745;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        #audioBtn.active {
            background: #555;
        }
    </style>
</head>

<body>

    <h1>🎩 Sorting Hat</h1>

    <p>Hat Status:</p>
    <h2 id="hatStatus">Checking...</h2>

    <p>House Allotted:</p>
    <h2 id="result">Waiting...</h2>

    <!-- 🔊 Audio Activate Button -->
    <button id="audioBtn">Enable Sound 🔊</button>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 🔥 Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyADKtoS9JyrWsYYbf9BdV2wxSOagvJ8y6o",
          authDomain: "sortinghat-21d61.firebaseapp.com",
          databaseURL: "https://sortinghat-21d61-default-rtdb.firebaseio.com",
          projectId: "sortinghat-21d61",
          storageBucket: "sortinghat-21d61.firebasestorage.app",
          messagingSenderId: "52060870997",
          appId: "1:52060870997:web:ad4c519e58fa07e1d7b7dc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🔊 Sounds
        const soundList = [
            new Audio("sound/garudadwar_1.mp3"),
            new Audio("sound/garudadwar_2.mp3"),
            new Audio("sound/mehenatkash.mp3"),
            new Audio("sound/nagshakti.mp3"),
            new Audio("sound/full_garudadwar.mp3")
        ];

        const soundNames = [
            "Garudadwar 🎩",
            "Garudadwar 2 🎩",
            "Mehenatkash 🎩",
            "Nagshakti 🎩",
            "Full Garudadwar 🎩"
        ];

        function stopAllSounds() {
            soundList.forEach(s => {
                s.pause();
                s.currentTime = 0;
            });
        }

        // 🔥 Shuffle system
        let playQueue = [];

        function shuffleArray() {
            let arr = [];
            for (let i = 0; i < soundList.length; i++) arr.push(i);

            for (let i = arr.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getNextSoundIndex() {
            if (playQueue.length === 0) {
                playQueue = shuffleArray();

                if (playQueue.length > 1 && lastPlayedIndex !== null) {
                    if (playQueue[playQueue.length - 1] === lastPlayedIndex) {
                        [playQueue[playQueue.length - 1], playQueue[playQueue.length - 2]] =
                        [playQueue[playQueue.length - 2], playQueue[playQueue.length - 1]];
                    }
                }
            }
            return playQueue.pop();
        }

        let isPlaying = false;
        let lastValue = 0;
        let lastPlayedIndex = null;
        let isAudioUnlocked = false;
        let currentValue = 0;

        function playRandomSound() {
            if (isPlaying) return;

            const index = getNextSoundIndex();
            const selectedSound = soundList[index];

            stopAllSounds();

            lastPlayedIndex = index;
            isPlaying = true;

            selectedSound.play().catch(err => {
                console.log("Audio blocked:", err);
            });

            document.getElementById("result").innerText = soundNames[index];

            selectedSound.onended = () => {
                isPlaying = false;
            };
        }

        // 🔊 BUTTON CLICK (Audio Unlock)
        const audioBtn = document.getElementById("audioBtn");

        audioBtn.addEventListener("click", () => {
            console.log("🔓 Audio enabled");

            soundList.forEach(s => {
                s.play().then(() => {
                    s.pause();
                    s.currentTime = 0;
                }).catch(() => {});
            });

            isAudioUnlocked = true;

            audioBtn.innerText = "Sound Enabled ✅";
            audioBtn.classList.add("active");

            // 🔥 Play if already activated
            if (currentValue == 1 && !isPlaying) {
                playRandomSound();
            }
        });

        const ref = db.ref("hat/activated");

        ref.on("value", (snapshot) => {
            const value = snapshot.val();
            currentValue = value;

            document.getElementById("hatStatus").innerText =
                value == 1 ? "Hat Worn ✅" : "Hat Not Worn ❌";

            if (value == 1 && lastValue == 0) {

                if (!isAudioUnlocked) {
                    console.log("⛔ Click Enable Sound button");
                } else {
                    playRandomSound();
                }
            }

            lastValue = value;
        });
    </script>

</body>
</html>
